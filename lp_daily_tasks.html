<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#ffffff; --surface:#f5f5f5; --border:#e4e4e4;
    --text:#111111; --text-2:#555555; --text-3:#aaaaaa;
    --red:#ef4444; --amber:#f59e0b; --radius:7px;
    --font:'Inter', system-ui, sans-serif;
  }
  body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:13px; line-height:1.5; padding:22px 20px 40px; max-width:640px; }

  /* HEADER */
  .hd { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:5px; }
  .hd-title { font-size:13px; font-weight:600; }
  .hd-right { display:flex; align-items:center; gap:8px; }
  .hd-date  { font-size:11px; color:var(--text-3); }
  .sync-btn { font-size:14px; color:var(--text-3); background:none; border:none; cursor:pointer; padding:1px 3px; border-radius:4px; line-height:1; transition:color .12s; }
  .sync-btn:hover { color:var(--text-2); }
  .sync-btn.spin { animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* STATUS */
  .status { font-size:10.5px; color:var(--text-3); min-height:14px; margin-bottom:4px; transition:color .15s; }
  .status.err { color:var(--red); }
  .status.ok  { color:#22c55e; }

  /* PROGRESS */
  .prog-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .prog-track { flex:1; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
  .prog-fill  { height:100%; background:var(--text); border-radius:2px; transition:width .3s ease; }
  .prog-pct   { font-size:11px; color:var(--text-3); min-width:28px; text-align:right; }

  /* FILTER TAGS */
  .filters { display:flex; gap:4px; margin-bottom:14px; flex-wrap:wrap; }
  .ftag {
    font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px;
    background:transparent; border:1px solid var(--border);
    color:var(--text-3); cursor:pointer; transition:all .12s; user-select:none;
  }
  .ftag:hover { background:var(--surface); color:var(--text-2); border-color:#ccc; }
  .ftag.active { background:var(--text); color:#fff; border-color:var(--text); }

  /* INPUT */
  .input-wrap { position:relative; margin-bottom:20px; }
  .task-input {
    width:100%; height:38px;
    border:1px solid var(--border); border-radius:var(--radius);
    padding:0 72px 0 12px;
    font-family:var(--font); font-size:13px; color:var(--text); background:var(--bg);
    outline:none; transition:border-color .12s;
  }
  .task-input::placeholder { color:var(--text-3); }
  .task-input:focus { border-color:#bbb; }
  .add-btn {
    position:absolute; right:5px; top:50%; transform:translateY(-50%);
    height:28px; padding:0 12px;
    background:var(--text); color:#fff; border:none; border-radius:5px;
    font-family:var(--font); font-size:11.5px; font-weight:500;
    cursor:pointer; transition:opacity .12s;
  }
  .add-btn:hover { opacity:.72; }
  .add-btn:disabled { opacity:.35; cursor:default; }

  /* PREVIEW CHIPS */
  .tag-preview { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; min-height:0; }

  /* AUTOCOMPLETE */
  .autocomplete {
    position:absolute; top:calc(100% + 2px); left:0;
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:0 4px 16px rgba(0,0,0,.08); z-index:100;
    min-width:180px; overflow:hidden; display:none;
  }
  .autocomplete.show { display:block; }
  .ac-item { padding:7px 12px; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .08s; }
  .ac-item:hover, .ac-item.focused { background:var(--surface); }
  .ac-hash { color:var(--text-3); }
  .ac-new-badge { font-size:10px; color:var(--text-3); margin-left:4px; }

  /* CHIPS */
  .chip { display:inline-flex; align-items:center; font-size:10.5px; font-weight:500; padding:2px 7px; border-radius:20px; letter-spacing:.01em; line-height:1.6; }

  /* SECTION LABEL */
  .sec-lbl { font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-3); padding:14px 0 5px 2px; }

  /* TASK */
  .task-list { display:flex; flex-direction:column; gap:1px; }
  .task { display:flex; align-items:flex-start; gap:9px; padding:8px 8px 8px 10px; border-radius:6px; transition:background .1s; }
  .task:hover { background:var(--surface); }
  .task:hover .t-del { opacity:1; }
  .task.done { opacity:.35; }
  .task.done .t-text { text-decoration:line-through; }

  .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:6px; }
  .d-high   { background:var(--red); }
  .d-medium { background:var(--amber); }
  .d-low    { background:var(--border); }
  .d-none   { background:transparent; }

  .cb { width:15px; height:15px; border:1.5px solid var(--border); border-radius:4px; flex-shrink:0; margin-top:2px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; background:var(--bg); }
  .task.done .cb { background:var(--text); border-color:var(--text); }
  .cb::after { content:''; width:4px; height:7px; border:1.5px solid #fff; border-top:none; border-left:none; transform:rotate(45deg) translateY(-1px); opacity:0; }
  .task.done .cb::after { opacity:1; }

  .t-body { flex:1; min-width:0; cursor:pointer; }
  .t-text  { font-size:12.5px; color:var(--text); line-height:1.45; font-weight:400; }
  .t-chips { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }

  .t-del { background:none; border:none; color:var(--text-3); font-size:12px; cursor:pointer; padding:2px 4px; border-radius:4px; opacity:0; transition:opacity .1s, color .1s; flex-shrink:0; line-height:1; margin-top:1px; }
  .t-del:hover { color:var(--red); }

  /* SKELETON */
  .skeleton { height:34px; border-radius:6px; margin-bottom:2px; background:linear-gradient(90deg,var(--surface) 25%,#ebebeb 50%,var(--surface) 75%); background-size:200% 100%; animation:shimmer 1.2s infinite; }
  @keyframes shimmer { to { background-position:-200% 0; } }

  .empty { padding:28px 0; text-align:center; color:var(--text-3); font-size:12px; }

  /* DONE TOGGLE */
  .done-row { display:flex; align-items:center; gap:6px; margin-top:20px; padding-top:14px; border-top:1px solid var(--border); cursor:pointer; color:var(--text-3); font-size:11px; font-weight:500; user-select:none; transition:color .12s; }
  .done-row:hover { color:var(--text-2); }
  .chev { font-size:8px; transition:transform .18s; display:inline-block; }
  .done-row.open .chev { transform:rotate(90deg); }
  #doneWrap { margin-top:6px; }

  @keyframes up { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
  .task { animation:up .14s ease both; }
</style>
</head>
<body>

<div class="hd">
  <span class="hd-title">Today</span>
  <div class="hd-right">
    <span class="hd-date" id="hDate"></span>
    <button class="sync-btn" id="syncBtn" onclick="loadTasks()" title="Refresh">↻</button>
  </div>
</div>
<div class="status" id="status"></div>
<div class="prog-row">
  <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
  <div class="prog-pct" id="pPct">0%</div>
</div>
<div class="filters" id="filters">
  <div class="ftag active" data-f="all" onclick="setFilter(this,'all')">All</div>
</div>

<div class="input-wrap" id="inputWrap">
  <input class="task-input" id="taskInput"
    placeholder="Add a task… use #deals #high or #newtag"
    autocomplete="off"
    onkeydown="handleKey(event)"
    oninput="handleInput(event)" />
  <button class="add-btn" id="addBtn" onclick="addTask()">Add</button>
  <div class="autocomplete" id="autocomplete"></div>
  <div class="tag-preview" id="tagPreview"></div>
</div>

<div id="wrap"></div>
<div class="done-row" id="dRow" onclick="toggleDone(this)">
  <span class="chev">▶</span>
  <span id="dLbl">Completed (0)</span>
</div>
<div id="doneWrap" style="display:none"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const NOTION_TOKEN = 'ntn_Z85910402648RqbQykMzTFtdQIHzX1oXQLD659JUwRFaob';
const DATABASE_ID  = '1679e65a56564772af32eecd49dd4849';
// ───────────────────────────────────────────────────────────────────────────

const PRIORITY_TAGS = new Set(['high','medium','low']);
const TAG_COLOR_CYCLE = ['blue','orange','green','yellow','purple','pink','red','brown','gray'];
const NOTION_TO_CSS = {
  blue:   {bg:'#dbeafe',color:'#1d4ed8'}, orange:{bg:'#ffedd5',color:'#c2410c'},
  green:  {bg:'#dcfce7',color:'#15803d'}, yellow:{bg:'#fef9c3',color:'#a16207'},
  purple: {bg:'#f3e8ff',color:'#7e22ce'}, pink:  {bg:'#fce7f3',color:'#be185d'},
  red:    {bg:'#fee2e2',color:'#b91c1c'}, brown: {bg:'#f5f0eb',color:'#78350f'},
  gray:   {bg:'#f3f4f6',color:'#4b5563'}, default:{bg:'#f3f4f6',color:'#374151'},
};

let tasks        = [];
let tagColorMap  = {}; // lowercase tag → notion color string
let knownTags    = new Set(['deals','team','build','admin','personal']);
let activeFilter = 'all';
let showDone     = false;
let acIndex      = -1;

// ── NOTION ─────────────────────────────────────────────────────────────────
async function notionReq(method, path, body) {
  const res = await fetch(`https://api.notion.com/v1${path}`, {
    method,
    headers: {
      'Authorization': `Bearer ${NOTION_TOKEN}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||`HTTP ${res.status}`); }
  return res.json();
}

// ── LOAD ───────────────────────────────────────────────────────────────────
async function loadTasks() {
  document.getElementById('syncBtn').classList.add('spin');
  setStatus('Syncing…');
  showSkeleton();
  try {
    const data = await notionReq('POST', `/databases/${DATABASE_ID}/query`, {
      sorts: [{ timestamp:'created_time', direction:'ascending' }]
    });
    tasks = data.results.map(pageToTask);
    // Populate tag color map and known tags from existing data
    tasks.forEach(t => {
      t.tags.forEach(tag => {
        const k = tag.toLowerCase();
        knownTags.add(k);
        if (t.tagColors[k]) tagColorMap[k] = t.tagColors[k];
      });
    });
    setStatus('','ok');
    renderFilters();
    render();
  } catch(e) {
    setStatus('Could not reach Notion — check token','err');
    document.getElementById('wrap').innerHTML = '<div class="empty">Connection error. Check your Notion token.</div>';
  } finally {
    document.getElementById('syncBtn').classList.remove('spin');
  }
}

function pageToTask(page) {
  const p = page.properties;
  const multiSel = p.Category?.multi_select || [];
  const tagColors = {};
  multiSel.forEach(s => { tagColors[s.name.toLowerCase()] = s.color || 'default'; });
  return {
    id:        page.id,
    text:      p.Task?.title?.[0]?.plain_text || '(untitled)',
    tags:      multiSel.map(s => s.name),
    tagColors,
    priority:  p.Priority?.select?.name?.toLowerCase() || null,
    done:      p.Done?.checkbox || false,
  };
}

// ── PARSE HASHTAGS ─────────────────────────────────────────────────────────
function parseTags(raw) {
  const matches = [...raw.matchAll(/#([\w-]+)/g)];
  const all = matches.map(m => m[1].toLowerCase());
  const priority = all.find(t => PRIORITY_TAGS.has(t)) || null;
  const cats = [...new Set(all.filter(t => !PRIORITY_TAGS.has(t)))];
  const text = raw.replace(/#[\w-]+/g,'').replace(/\s+/g,' ').trim();
  return { text, cats, priority };
}

// ── ADD ────────────────────────────────────────────────────────────────────
async function addTask() {
  const input = document.getElementById('taskInput');
  const raw = input.value.trim();
  if (!raw) return;
  const { text, cats, priority } = parseTags(raw);
  if (!text) { setStatus("Task text can't be only hashtags",'err'); return; }

  document.getElementById('addBtn').disabled = true;
  setStatus('Adding…');
  input.value = '';
  clearPreview();
  closeAC();

  // Register new tags, assign colors for any we haven't seen
  cats.forEach(tag => {
    knownTags.add(tag);
    if (!tagColorMap[tag]) {
      const idx = [...knownTags].filter(t => !PRIORITY_TAGS.has(t)).indexOf(tag);
      tagColorMap[tag] = TAG_COLOR_CYCLE[idx % TAG_COLOR_CYCLE.length];
    }
  });

  const props = {
    Task: { title: [{ text: { content: text } }] },
    Done: { checkbox: false },
  };
  if (cats.length)  props.Category = { multi_select: cats.map(c => ({ name: cap(c) })) };
  if (priority)     props.Priority = { select: { name: cap(priority) } };

  try {
    const page = await notionReq('POST', '/pages', { parent:{ database_id: DATABASE_ID }, properties: props });
    const tagColors = {};
    cats.forEach(c => { tagColors[c] = tagColorMap[c] || 'default'; });
    tasks.unshift({ id: page.id, text, tags: cats.map(cap), tagColors, priority, done: false });
    setStatus('Added','ok');
    renderFilters();
    render();
  } catch(e) {
    setStatus('Failed — ' + e.message,'err');
    input.value = raw;
  } finally {
    document.getElementById('addBtn').disabled = false;
  }
}

// ── TOGGLE / DELETE ────────────────────────────────────────────────────────
async function toggleTask(id) {
  const t = tasks.find(t => t.id === id); if (!t) return;
  t.done = !t.done; render();
  try { await notionReq('PATCH', `/pages/${id}`, { properties:{ Done:{ checkbox: t.done } } }); }
  catch(e) { t.done = !t.done; setStatus('Update failed','err'); render(); }
}

async function deleteTask(id, e) {
  e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id); render();
  try { await notionReq('PATCH', `/pages/${id}`, { archived: true }); }
  catch(e) { setStatus('Delete failed','err'); loadTasks(); }
}

// ── FILTER ─────────────────────────────────────────────────────────────────
function setFilter(el, f) {
  document.querySelectorAll('.ftag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeFilter = f;
  render();
}

function renderFilters() {
  const bar = document.getElementById('filters');
  const allTags = new Set();
  tasks.forEach(t => t.tags.forEach(tag => allTags.add(tag)));

  bar.innerHTML = `<div class="ftag${activeFilter==='all'?' active':''}" data-f="all" onclick="setFilter(this,'all')">All</div>`;
  [...allTags].sort().forEach(tag => {
    const k = tag.toLowerCase();
    const div = document.createElement('div');
    div.className = 'ftag' + (activeFilter === k ? ' active' : '');
    div.dataset.f = k;
    div.textContent = tag;
    div.onclick = () => setFilter(div, k);
    bar.appendChild(div);
  });
}

// ── AUTOCOMPLETE ───────────────────────────────────────────────────────────
function handleInput(e) {
  updatePreview(e.target.value);
  const val = e.target.value;
  const hashPos = val.lastIndexOf('#');
  if (hashPos === -1) { closeAC(); return; }
  const partial = val.slice(hashPos + 1).toLowerCase();
  showAC(partial);
}

function handleKey(e) {
  const ac = document.getElementById('autocomplete');
  const items = ac.querySelectorAll('.ac-item');
  if (e.key === 'Enter') {
    if (ac.classList.contains('show') && acIndex >= 0 && items[acIndex]) {
      e.preventDefault(); selectAC(items[acIndex].dataset.tag);
    } else { e.preventDefault(); addTask(); }
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex+1, items.length-1); items.forEach((el,i) => el.classList.toggle('focused', i===acIndex)); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); acIndex = Math.max(acIndex-1, 0);              items.forEach((el,i) => el.classList.toggle('focused', i===acIndex)); return; }
  if (e.key === 'Escape')    { closeAC(); }
}

function showAC(partial) {
  const ac = document.getElementById('autocomplete');
  const allOpts = [
    ...[...PRIORITY_TAGS],
    ...[...knownTags].filter(t => !PRIORITY_TAGS.has(t)).sort()
  ];
  const matches = partial === '' ? allOpts : allOpts.filter(t => t.startsWith(partial) && t !== partial);
  acIndex = -1;
  ac.innerHTML = '';

  matches.forEach(tag => {
    const div = document.createElement('div');
    div.className = 'ac-item'; div.dataset.tag = tag;
    const { bg, color } = chipStyleFor(tag, PRIORITY_TAGS.has(tag) ? 'priority' : 'cat');
    div.innerHTML = `<span class="chip" style="background:${bg};color:${color};font-size:10px">#${esc(tag)}</span>`;
    div.onclick = () => selectAC(tag);
    ac.appendChild(div);
  });

  if (partial.length > 0 && !allOpts.includes(partial)) {
    const div = document.createElement('div');
    div.className = 'ac-item'; div.dataset.tag = partial;
    div.innerHTML = `<span class="ac-hash">#</span>${esc(partial)}<span class="ac-new-badge">new tag</span>`;
    div.onclick = () => selectAC(partial);
    ac.appendChild(div);
  }

  ac.classList.toggle('show', ac.children.length > 0);
}

function selectAC(tag) {
  const input = document.getElementById('taskInput');
  const val = input.value;
  const hp = val.lastIndexOf('#');
  input.value = val.slice(0, hp) + '#' + tag + ' ';
  input.focus(); closeAC(); updatePreview(input.value);
}

function closeAC() { document.getElementById('autocomplete').classList.remove('show'); acIndex = -1; }

document.addEventListener('click', e => {
  if (!document.getElementById('inputWrap').contains(e.target)) closeAC();
});

// ── TAG PREVIEW ────────────────────────────────────────────────────────────
function updatePreview(val) {
  const { cats, priority } = parseTags(val);
  const preview = document.getElementById('tagPreview');
  preview.innerHTML = '';
  if (priority) preview.appendChild(makeChipEl(priority, 'priority'));
  cats.forEach(c => preview.appendChild(makeChipEl(c, 'cat')));
}

function clearPreview() { document.getElementById('tagPreview').innerHTML = ''; }

// ── CHIP HELPERS ───────────────────────────────────────────────────────────
function chipStyleFor(tag, type) {
  const k = tag.toLowerCase();
  if (type === 'priority') {
    if (k==='high')   return {bg:'#fee2e2',color:'#b91c1c'};
    if (k==='medium') return {bg:'#fef9c3',color:'#a16207'};
    if (k==='low')    return {bg:'#f3f4f6',color:'#4b5563'};
  }
  const nc = tagColorMap[k] || 'default';
  return NOTION_TO_CSS[nc] || NOTION_TO_CSS.default;
}

function makeChipEl(label, type) {
  const span = document.createElement('span');
  span.className = 'chip';
  const { bg, color } = chipStyleFor(label, type);
  span.style.cssText = `background:${bg};color:${color}`;
  span.textContent = '#' + label;
  return span;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('hDate').textContent = fmtDate();
  const total = tasks.length, doneN = tasks.filter(t=>t.done).length;
  const pct = total ? Math.round(doneN/total*100) : 0;
  document.getElementById('pFill').style.width = pct+'%';
  document.getElementById('pPct').textContent  = pct+'%';
  document.getElementById('dLbl').textContent  = `Completed (${doneN})`;

  const priOrd = {high:0,medium:1,low:2};
  const active = tasks
    .filter(t => !t.done)
    .filter(t => activeFilter==='all' || t.tags.map(x=>x.toLowerCase()).includes(activeFilter));

  const wrap = document.getElementById('wrap');
  wrap.innerHTML = '';
  if (!active.length) {
    wrap.innerHTML = '<div class="empty">All clear.</div>';
  } else {
    const ul = document.createElement('div'); ul.className = 'task-list';
    [...active].sort((a,b) => (priOrd[a.priority]??3)-(priOrd[b.priority]??3))
               .forEach(t => ul.appendChild(mkEl(t)));
    wrap.appendChild(ul);
  }

  const done = tasks.filter(t => t.done && (activeFilter==='all' || t.tags.map(x=>x.toLowerCase()).includes(activeFilter)));
  const dw = document.getElementById('doneWrap'); dw.innerHTML = '';
  if (done.length) {
    const ul = document.createElement('div'); ul.className = 'task-list';
    done.forEach(t => ul.appendChild(mkEl(t)));
    dw.appendChild(ul);
  }
}

function mkEl(t) {
  const div = document.createElement('div');
  div.className = 'task' + (t.done ? ' done' : '');
  const dc = t.priority ? `d-${t.priority}` : 'd-none';
  const chipsHtml = t.tags.map(tag => {
    const { bg, color } = chipStyleFor(tag, 'cat');
    return `<span class="chip" style="background:${bg};color:${color}">#${esc(tag.toLowerCase())}</span>`;
  }).join('');
  div.innerHTML = `
    <div class="dot ${dc}"></div>
    <div class="cb" onclick="toggleTask('${t.id}')"></div>
    <div class="t-body" onclick="toggleTask('${t.id}')">
      <div class="t-text">${esc(t.text)}</div>
      ${chipsHtml ? `<div class="t-chips">${chipsHtml}</div>` : ''}
    </div>
    <button class="t-del" onclick="deleteTask('${t.id}',event)">✕</button>`;
  return div;
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmtDate() {
  const d = new Date();
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]
    + ', ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]
    + ' ' + d.getDate();
}
function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status'+(type?' '+type:'');
  if (type==='ok') setTimeout(()=>{ el.textContent=''; el.className='status'; }, 1800);
}
function showSkeleton() {
  document.getElementById('wrap').innerHTML = [1,2,3,4].map(()=>'<div class="skeleton"></div>').join('');
}
function toggleDone(row) {
  showDone = !showDone; row.classList.toggle('open',showDone);
  document.getElementById('doneWrap').style.display = showDone ? 'block' : 'none';
}
function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1).toLowerCase(); }
